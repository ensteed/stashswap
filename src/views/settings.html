<section class="settings-page">
  <div class="settings-header">
    <div>
      <h2>Settings</h2>
      <p>Manage shipping addresses and seller payouts.</p>
    </div>
  </div>

  <div class="settings-grid">
    <section class="settings-card">
      <div class="settings-card-header">
        <div>
          <h3>Address book</h3>
          <p>Save default shipping details for checkout.</p>
        </div>
      </div>
      {{address_book_html}}
    </section>

    <section class="settings-card">
      <div class="settings-card-header">
        <div>
          <h3>Stripe Connect</h3>
          <p>Link a Stripe Express account to accept payouts as a seller.</p>
        </div>
      </div>
      {{stripe_card_html}}
    </section>
  </div>
</section>
