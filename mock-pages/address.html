<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Address Settings</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --primary: #2563eb;
      --primary-soft: #eff6ff;
      --danger: #dc2626;
      --danger-soft: #fef2f2;
      --success: #16a34a;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 40px 20px;
    }

    .settings-wrapper {
      max-width: 860px;
      margin: 0 auto;
    }

    .settings-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .settings-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      padding: 28px 28px 20px;
      border-bottom: 1px solid var(--border);
    }

    .settings-title {
      margin: 0;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .settings-subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .add-btn {
      border: none;
      background: var(--primary);
      color: white;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s ease;
      white-space: nowrap;
    }

    .add-btn:hover {
      opacity: 0.92;
      transform: translateY(-1px);
    }

    .address-list {
      padding: 8px;
    }

    .address-item {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      padding: 20px;
      border-radius: 18px;
      transition: background 0.2s ease;
    }

    .address-item + .address-item {
      border-top: 1px solid var(--border);
    }

    .address-item:hover {
      background: #fafafa;
    }

    .address-main {
      flex: 1;
      min-width: 0;
    }

    .address-topline {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .address-label {
      font-weight: 700;
      font-size: 1rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 5px 10px;
      border-radius: 999px;
      background: #ecfdf3;
      color: var(--success);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .address-lines {
      color: var(--muted);
      line-height: 1.6;
      font-size: 0.95rem;
    }

    .address-actions {
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }

    .btn {
      border: 1px solid var(--border);
      background: white;
      color: var(--text);
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .btn:hover {
      background: #f9fafb;
    }

    .btn-primary {
      color: var(--primary);
      background: var(--primary-soft);
      border-color: #bfdbfe;
    }

    .btn-primary:hover {
      background: #dbeafe;
    }

    .btn-danger {
      color: var(--danger);
      background: var(--danger-soft);
      border-color: #fecaca;
    }

    .btn-danger:hover {
      background: #fee2e2;
    }

    @media (max-width: 640px) {
      .settings-header,
      .address-item {
        flex-direction: column;
        align-items: stretch;
      }

      .address-actions {
        width: 100%;
      }

      .address-actions .btn {
        flex: 1;
      }

      .add-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="settings-wrapper">
    <section class="settings-card">
      <div class="settings-header">
        <div>
          <h2 class="settings-title">Saved Addresses</h2>
          <p class="settings-subtitle">
            Manage your shipping and billing addresses for faster checkout.
          </p>
        </div>
        <button class="add-btn">+ Add New Address</button>
      </div>

      <div class="address-list">
        <div class="address-item">
          <div class="address-main">
            <div class="address-topline">
              <span class="address-label">Home</span>
              <span class="badge">Default</span>
            </div>
            <div class="address-lines">
              Jane Doe<br />
              123 Maple Street, Apt 4B<br />
              Brooklyn, NY 11201<br />
              United States
            </div>
          </div>
          <div class="address-actions">
            <button class="btn btn-primary">Edit</button>
            <button class="btn btn-danger">Delete</button>
          </div>
        </div>

        <div class="address-item">
          <div class="address-main">
            <div class="address-topline">
              <span class="address-label">Work</span>
            </div>
            <div class="address-lines">
              Jane Doe<br />
              450 Market Street, Floor 12<br />
              San Francisco, CA 94105<br />
              United States
            </div>
          </div>
          <div class="address-actions">
            <button class="btn btn-primary">Edit</button>
            <button class="btn btn-danger">Delete</button>
          </div>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
